<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="calword.css">
    <script src="calword.js" defer></script>
    <title>calculate word</title>
</head>
<body>
    <div class="container">
        <div class="wordcalculate">
            <h2>Type a Sentence</h2>
            <div class="calculate">
               <label for="writeyourmessage"></label>
               <textarea id="writeyourmessage"  placeholder="Type your sentence here" rows="10"></textarea>
            </div>
            <div class="button-container">
                    <button type="button" onclick="calculate()" >Calculate Words</button>
            </div>
            <div id="displayResult" class="result"></div>
            
        </div>
    </div>
</body>
</html>
