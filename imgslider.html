<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="imgslider.css">
    <script src="imgslider.js" defer></script>
</head>
<body>
    <div class="slider-container">
        <div class="slider" >
            <div class="slide">
                <img src="https://picsum.photos/id/1/800/400" alt="first-image">
            </div>
            <div class="slide">
                <img src="https://picsum.photos/id/2/800/400" alt="second-image">
            </div>
            <div class="slide">
                <img src="https://picsum.photos/id/4/800/400" alt="third-image">
            </div>
        </div>
        <button type="button" class="slider-button-prev">&#10094;</button>
        <button type="button" class="slider-button-next">&#10095;</button>
        <div class="dots-container"></div>
    </div>
</body>
</html>
